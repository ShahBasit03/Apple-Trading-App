<!DOCTYPE html>
<html>
<head>
    <title>Grower Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-green-50 p-8">
    <nav class="bg-green-800 text-white p-4 shadow-md mb-8"> <!-- Fixed text color to white -->
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">Kashmir Apple Exchange</h1>
            <div class="space-x-6">
                <a href="/" class="hover:underline text-yellow-300">Post Lot</a>
                <a href="/grower/my-bids" class="hover:underline">Check My Bids</a>
                <a href="/trader/dashboard" class="hover:underline">Trader Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-10">
        <h2 class="text-3xl font-bold text-green-800 mb-6">List Your Apple Lot</h2>
        
        <form action="/list-apples" method="POST" class="space-y-4">
            <!-- Apple Details -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Apple Variety</label>
                <select name="variety" class="mt-1 block w-full rounded-md border border-gray-300 p-2">
                    <option>Red Delicious (Kulu)</option>
                    <option>American</option>
                    <option>Ambri Apples</option>
                    <option>Trel</option>
                    <option>Chamora</option>
                    <option>Golden Delicious</option>
                    <option>Maharaji</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Grade</label>
                    <input type="text" name="grade" placeholder="e.g., A" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">No. of Boxes</label>
                    <input type="number" name="boxes" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Minimum Price (per box ₹)</label>
                <input type="number" name="price" placeholder="₹" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
            </div>

            <!-- NEW: FEASIBLE ADDITIONS FOR CONTACT EXCHANGE -->
            <div class="border-t pt-4 mt-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">Your Contact Details</h3>
                <p class="text-xs text-gray-500 mb-4">These will only be shown to a trader after you "Lock" a deal with them.</p>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" name="grower_name" placeholder="Enter your name" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="tel" name="grower_phone" placeholder="10-digit number" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition mt-6">
                Post Listing
            </button>
        </form>
    </div>
</body>
</html>
